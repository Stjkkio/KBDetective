name: Build & Release

on:
  push:
    tags:
      - "v*"          # trigger on any tag like v1.0, v1.2.3
  workflow_dispatch:  # also allow manual runs from the Actions tab

jobs:
  # ── 1. Run tests on Linux (fast, cheap) ────────────────────────────────
  test:
    name: Unit tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r keyblock_detective/requirements-dev.txt

      - name: Run pytest
        run: python -m pytest keyblock_detective/tests/ -v

  # ── 2. Build .exe on Windows ────────────────────────────────────────────
  build-exe:
    name: Build Windows .exe
    needs: test          # only build if tests pass
    runs-on: windows-latest

    defaults:
      run:
        working-directory: keyblock_detective

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller>=6.0

      - name: Generate fallback tray icon
        # Pillow is already installed; produce assets/icon.png so the bundle has it
        shell: python
        run: |
          from PIL import Image, ImageDraw
          from pathlib import Path
          Path("assets").mkdir(exist_ok=True)
          img = Image.new("RGBA", (64, 64), (30, 30, 30, 255))
          d = ImageDraw.Draw(img)
          d.rectangle([8, 8, 56, 56], outline=(0, 180, 255), width=3)
          d.text((18, 20), "KB", fill=(0, 180, 255))
          img.save("assets/icon.png")
          # Also save .ico for the taskbar/window icon
          img.save("assets/icon.ico")

      - name: Build with PyInstaller
        run: >
          pyinstaller
          --onefile
          --windowed
          --name KeyBlockDetective
          --icon assets\icon.ico
          --add-data "assets;assets"
          --hidden-import win32timezone
          main.py

      - name: Smoke-check the binary exists
        run: Test-Path dist\KeyBlockDetective.exe
        shell: pwsh

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyBlockDetective-windows
          path: keyblock_detective/dist/KeyBlockDetective.exe
          if-no-files-found: error

  # ── 3. Create a GitHub Release and attach the .exe ─────────────────────
  release:
    name: GitHub Release
    needs: build-exe
    runs-on: ubuntu-latest
    # Only publish a release when a version tag was pushed (not on manual runs)
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write   # needed to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Download .exe artifact
        uses: actions/download-artifact@v4
        with:
          name: KeyBlockDetective-windows
          path: dist/

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KeyBlockDetective.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0-beta → pre-release
